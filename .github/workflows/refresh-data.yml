name: Refresh data from spreadsheet

on:
  # 手動トリガー（GitHub の Actions 画面の "Run workflow" ボタン / API）
  workflow_dispatch:
  # 定期トリガー：10分ごと。ただし下の if でゲートしているので
  # リポジトリ変数 FESTIVAL_MODE=on の時だけ実際に取り込む（本番週だけON）。
  schedule:
    - cron: '*/10 * * * *'

permissions:
  contents: write
  pages: write
  id-token: write

# Pages デプロイは deploy.yml と同じグループにして衝突を避ける
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    # 手動実行は常に許可。定期実行は本番週（FESTIVAL_MODE=on）だけ実行。
    if: >-
      github.event_name == 'workflow_dispatch' ||
      vars.FESTIVAL_MODE == 'on'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # スプレッドシートから再取り込み（public/items.json を再生成）
      - run: node scripts/importItems.mjs

      # 変化があればコミットして履歴に残す
      - name: Commit updated items.json if changed
        run: |
          if [[ -n "$(git status --porcelain public/items.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/items.json
            git commit -m "chore: refresh items.json from spreadsheet [skip ci]"
            git push
          else
            echo "items.json に変更なし"
          fi

      # ビルドして Pages へ配信（取り込み結果を即公開）
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
